project:
  type: website
  output-dir: _site

execute:
  freeze: auto

bibliography: bibliography.bib
resource-path: 
  - .
biblio-style: apa

website:
  title: "芹香のブログ 気軽にコメント残してね！"
  navbar:
    pinned: false
    left:
      - href: index.qmd
        text: Home
      - about.qmd
    right:
      - icon: book
        href: https://syosetu.org/novel/309340/
      - icon: github
        href: https://github.com/SerikaYuzuki
      - icon: twitter
        href: https://twitter.com/serika_yuzuki

  sidebar:
    style: "docked"
    search: true
    contents:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - auto: "posts/"

  # Back to top button in the bottom
  back-to-top-navigation: true

format:
  html:
    theme:
      dark: _scss/theme-glass-dark.scss
      light: _scss/theme-glass-light.scss
    css: styles.css
    include-in-header:
      - _includes/sidebar-toggle.html
      - _includes/plotly-config.html

    toc: true
    toc-location: right
    toc-depth: 3

    code-fold: true
    code-summary: "コードはこちら"
    code-copy: true

    # Commenting system via giscus
    comments:
      giscus: 
        repo: SerikaYuzuki/Developing-Journal
        theme: transparent_dark
