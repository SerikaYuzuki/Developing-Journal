<script>
document.addEventListener("DOMContentLoaded", function() {
  // ナビゲーションバーのタイトル左にボタンを配置
  const brandContainer = document.querySelector('.navbar-brand-container');
  if (brandContainer) {
    const toggleBtn = document.createElement('a');
    toggleBtn.href = "#";
    toggleBtn.innerHTML = `<i class="bi bi-list"></i>`; // Bootstrapのハンバーガーアイコン
    toggleBtn.className = 'navbar-sidebar-toggle pe-2';
    toggleBtn.style.color = 'inherit';
    toggleBtn.style.textDecoration = 'none';
    toggleBtn.style.fontSize = '1.5rem';
    toggleBtn.style.display = 'flex';
    toggleBtn.style.alignItems = 'center';
    toggleBtn.title = "サイドバーを切り替え";
    
    // タイトルの直前に挿入
    brandContainer.insertBefore(toggleBtn, brandContainer.firstChild);

    // クリック時の動作
    toggleBtn.addEventListener('click', function(e) {
      e.preventDefault();
      
      // スマホサイズ等の場合はQuartoデフォルトのサイドバー開閉をトリガーする
      if (window.innerWidth < 992) {
        const quartoToggle = document.querySelector('.quarto-secondary-nav .quarto-btn-toggle');
        if (quartoToggle) {
          quartoToggle.click();
        }
        return;
      }

      const body = document.body;
      if (body.classList.contains('custom-sidebar-hidden')) {
        // 現在非表示（全画面）の場合 -> サイドバーを元に戻すアニメーション
        body.classList.remove('custom-sidebar-hidden');
        body.classList.add('custom-sidebar-showing');
        
        // アニメーション完了後にクラスを外す
        setTimeout(() => {
          body.classList.remove('custom-sidebar-showing');
        }, 400);
      } else {
        // 現在表示されている場合 -> サイドバーを隠して全画面にする
        body.classList.remove('custom-sidebar-showing');
        body.classList.add('custom-sidebar-hidden');
      }
    });
  }
});
</script>
